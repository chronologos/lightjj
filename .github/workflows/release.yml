name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prev_tag: ${{ steps.check.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from version.txt
        id: check
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC token → Sigstore for keyless signing
      attestations: write   # write build provenance to the repo's attestation store
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          # Outputs to ../cmd/lightjj/frontend-dist/ (embedded via //go:embed)

      - name: Cross-compile binaries
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          # -tags embed:  selects frontend_embed.go (//go:embed all:frontend-dist).
          #               Default builds use frontend_stub.go (a static help page),
          #               so bare `go install` produces a usable binary even
          #               though the module proxy has no frontend-dist.
          # -trimpath:    strips runner filesystem paths from debug info, so
          #               builds at the same commit are byte-identical across
          #               runners. Combined with -s -w (no symbol table / debug
          #               info), Go binaries are reproducible — anyone with the
          #               same Go version + commit can rebuild bit-for-bit.
          LDFLAGS="-s -w -X main.version=$VERSION"
          mkdir -p dist

          GOOS=darwin GOARCH=arm64 go build -tags embed -trimpath -ldflags "$LDFLAGS" -o dist/lightjj-macos-arm64 ./cmd/lightjj
          GOOS=linux  GOARCH=amd64 go build -tags embed -trimpath -ldflags "$LDFLAGS" -o dist/lightjj-linux-x86_64 ./cmd/lightjj
          GOOS=linux  GOARCH=arm64 go build -tags embed -trimpath -ldflags "$LDFLAGS" -o dist/lightjj-linux-arm64 ./cmd/lightjj

      - name: Generate checksums
        working-directory: dist
        run: shasum -a 256 lightjj-* > checksums.sha256

      # SLSA v1.0 build provenance via Sigstore's public-good transparency log.
      # Proves the binary was produced by THIS workflow file at THIS commit on a
      # GitHub-hosted runner. End users verify with `gh attestation verify`.
      # Subjects are listed by hash inside the attestation, so the checksums
      # file is covered too — no need to attest it separately.
      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/lightjj-macos-arm64
            dist/lightjj-linux-x86_64
            dist/lightjj-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Changelog: one bullet per commit, with two passes of cleanup:
      #   1. strip leading "vX.Y.Z: " prefix (it's already in the release header)
      #   2. truncate to first sentence boundary OR 120 chars, whichever comes
      #      first — commit subjects in this repo are paragraph-length, and
      #      raw `%s` produces unreadable wall-of-text bullets.
      # Full detail is one click away via the auto-generated compare link below.
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ needs.check-version.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi
          CHANGELOG=$(git log --pretty=format:"%s" $RANGE | awk '{
            sub(/^v[0-9]+\.[0-9]+\.[0-9]+:[ \t]*/, "")
            head = substr($0, 1, 200)
            if (match(head, /\. [A-Z(]/)) {
              print "- " substr($0, 1, RSTART)
            } else if (length($0) > 120) {
              print "- " substr($0, 1, 117) "…"
            } else {
              print "- " $0
            }
          }')
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            Browser UI for [Jujutsu](https://docs.jj-vcs.dev/) version control.

            ### What's new

            ${{ steps.changelog.outputs.changelog }}

            **Full changelog:** https://github.com/${{ github.repository }}/compare/${{ needs.check-version.outputs.prev_tag }}...v${{ needs.check-version.outputs.version }}

            ### Install

            One-liner (macOS & Linux):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Or grab a binary directly:

            | Platform              | Download                                                                                                                |
            | --------------------- | ----------------------------------------------------------------------------------------------------------------------- |
            | macOS (Apple Silicon) | [lightjj-macos-arm64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/lightjj-macos-arm64) |
            | Linux (x86_64)        | [lightjj-linux-x86_64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/lightjj-linux-x86_64) |
            | Linux (arm64)         | [lightjj-linux-arm64](https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/lightjj-linux-arm64) |

            Then `chmod +x` and put it on your `PATH`. On macOS, also clear quarantine and ad-hoc sign:

            ```bash
            xattr -cr lightjj && codesign -s - -f lightjj
            ```

            ### Verify

            Binaries are signed with [SLSA build provenance](https://slsa.dev/) via Sigstore — the attestation cryptographically ties each binary back to this repo's release workflow on a GitHub-hosted runner. No personal signing keys are in the trust chain.

            ```bash
            gh attestation verify lightjj-macos-arm64 --repo ${{ github.repository }}
            shasum -a 256 -c checksums.sha256
            ```

            Builds use `-trimpath -ldflags="-s -w"` and are byte-reproducible: clone at tag `v${{ needs.check-version.outputs.version }}` and re-run the steps in [`.github/workflows/release.yml`](https://github.com/${{ github.repository }}/blob/v${{ needs.check-version.outputs.version }}/.github/workflows/release.yml) to get identical binaries.
          files: |
            dist/lightjj-macos-arm64
            dist/lightjj-linux-x86_64
            dist/lightjj-linux-arm64
            dist/checksums.sha256
